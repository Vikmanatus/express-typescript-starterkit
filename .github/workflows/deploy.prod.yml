name: Production deployment

on:
  push:
    branches: [feature/deploy-gcp]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  compile-typescript:
    name: Authentificate the worklow and deploy the app to App Engine
    runs-on: ubuntu-latest
    # env:
    #   SERVICE_ACCOUNT_EMAIL: '${{secrets.SERVICE_ACCOUNT_EMAIL}}'
    #   WORKLOAD_IDENTITY_PROVIDER: '${{secrets.WORKLOAD_IDENTITY_PROVIDER}}'
    # Add "id-token" with the intended permissions.
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v3
      - name: debugging local files
        run: ls -al
      - name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v1'
        with:
          workload_identity_provider: '${{secrets.WORKLOAD_IDENTITY_PROVIDER}}'
          service_account: '${{secrets.SERVICE_ACCOUNT_EMAIL}}'
      - name: Testing gcloud version
        run: gcloud --version
      - name: Testing secret extraction
        id: 'secrets'
        uses: 'google-github-actions/get-secretmanager-secrets@v1'
        with:
          secrets: |-
            fake_secret_1:${{secrets.GCP_SECRET_API_PREFIX}}/test-secret-value
            fake_secret_2:${{secrets.GCP_SECRET_API_PREFIX}}/fake-second-secet
      - name: Testing fake secret output
        run: |
          echo '${{ steps.secrets.outputs.fake_secret_1 }}' >> .env
          echo '${{ steps.secrets.outputs.fake_secret_2 }}' >> .env
          cat .env
      - name: Deploy to App Engine
        id: deploy
        uses: google-github-actions/deploy-appengine@v1
        with:
          deliverables: app.yaml
          project_id: '${{secrets.GCP_PROJECT}}'
          version: v0-0-4
      - name: Test
        run: curl "${{ steps.deploy.outputs.url }}"
